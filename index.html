<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Epic Collections Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useMemo } = React;
        
        const Dashboard = () => {
          // Test data - if you see this, data is loading!
          const testData = [
            { Release_Number: 500, Release_Date: "2026-03-03", Series: "Thor", Volume: 13, Subtitle: "The Surtur War", Type: "Epic", Licensed: "No", Reprint: "No", Pages: 496 },
            { Release_Number: 488, Release_Date: "2026-01-06", Series: "Amazing Spider-Man", Volume: 12, Subtitle: "Spider-Man - Threat or Menace?", Type: "Epic", Licensed: "No", Reprint: "No", Pages: 448 },
            { Release_Number: 489, Release_Date: "2026-01-06", Series: "Amazing Spider-Man Modern", Volume: 2, Subtitle: "The Life and Death of Spiders", Type: "Modern", Licensed: "No", Reprint: "No", Pages: 400 }
          ];

          return (
            <div className="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 text-white p-6">
              <div className="max-w-7xl mx-auto">
                <div className="text-center mb-8 p-6 bg-white/5 rounded-xl">
                  <h1 className="text-5xl font-bold bg-gradient-to-r from-red-600 to-red-400 bg-clip-text text-transparent">
                    Marvel Epic Collections Dashboard
                  </h1>
                  <p className="text-gray-400 text-lg mt-2">Test Version - {testData.length} books loaded</p>
                </div>

                <div className="bg-white/5 rounded-xl overflow-hidden border border-white/10 p-6">
                  <h2 className="text-2xl font-bold mb-4">Sample Data (showing first 3 books):</h2>
                  <div className="space-y-4">
                    {testData.map(book => (
                      <div key={book.Release_Number} className="bg-white/10 p-4 rounded-lg">
                        <div className="font-bold text-xl">#{book.Release_Number}: {book.Series}</div>
                        <div className="text-gray-300">{book.Subtitle}</div>
                        <div className="text-sm text-gray-400 mt-2">
                          {book.Release_Date} • {book.Type} • {book.Pages} pages
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
