<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Epic Collections 2026 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #e62429, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #aaa;
            font-size: 1.1em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #e62429;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #e62429;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .filters {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group label {
            color: #aaa;
            font-weight: 500;
        }
        
        select, input {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        
        select:hover, input:hover {
            border-color: #e62429;
        }
        
        select:focus, input:focus {
            border-color: #e62429;
            background: rgba(255,255,255,0.15);
        }
        
        button {
            background: linear-gradient(45deg, #e62429, #ff6b6b);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-title {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .table-container {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: rgba(230, 36, 41, 0.2);
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            user-select: none;
        }
        
        th:hover {
            background: rgba(230, 36, 41, 0.3);
        }
        
        tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .badge-epic {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        
        .badge-modern {
            background: rgba(168, 85, 247, 0.2);
            color: #c084fc;
        }
        
        .badge-ultimate {
            background: rgba(234, 179, 8, 0.2);
            color: #fbbf24;
        }
        
        .badge-reprint {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        
        .badge-licensed {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        
        .milestone {
            background: linear-gradient(45deg, #e62429, #ff6b6b);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        
        .search-box {
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Marvel Epic Collections 2026</h1>
            <p class="subtitle">Releases #488-544 | Your Complete Guide to the 500th Milestone</p>
        </header>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="filters">
            <div class="filter-group">
                <label>Type:</label>
                <select id="typeFilter">
                    <option value="all">All Types</option>
                    <option value="Epic">Epic</option>
                    <option value="Modern">Modern</option>
                    <option value="Ultimate">Ultimate</option>
                </select>
                
                <label>Licensed:</label>
                <select id="licensedFilter">
                    <option value="all">All</option>
                    <option value="Yes">Licensed Only</option>
                    <option value="No">Marvel Only</option>
                </select>
                
                <label>Reprints:</label>
                <select id="reprintFilter">
                    <option value="all">All</option>
                    <option value="No">New Only</option>
                    <option value="Yes">Reprints Only</option>
                </select>
                
                <label>Search:</label>
                <input type="text" id="searchBox" class="search-box" placeholder="Search series, subtitle...">
                
                <button onclick="resetFilters()">Reset Filters</button>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <h3 class="chart-title">Releases by Type</h3>
                <canvas id="typeChart"></canvas>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Releases by Month</h3>
                <canvas id="monthChart"></canvas>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Page Count Distribution</h3>
                <canvas id="pagesChart"></canvas>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Top Series by Count</h3>
                <canvas id="seriesChart"></canvas>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable('Release_Number')">#</th>
                        <th onclick="sortTable('Release_Date')">Date</th>
                        <th onclick="sortTable('Series')">Series</th>
                        <th onclick="sortTable('Volume')">Vol</th>
                        <th onclick="sortTable('Subtitle')">Subtitle</th>
                        <th onclick="sortTable('Type')">Type</th>
                        <th onclick="sortTable('Pages')">Pages</th>
                        <th>Tags</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        const csvData = \`Release_Number,Release_Date,Series,Volume,Subtitle,Type,Licensed,Reprint,Pages,ISBN
488,2026-01-06,Amazing Spider-Man,12,Spider-Man - Threat or Menace?,Epic,No,No,448,1302960490

532,2026-09-01,Ultimates,2,Gods and Monsters,Ultimate,No,No,344,1302969374
533,2026-09-08,Amazing Spider-Man Modern,4,Spider-Island,Modern,No,No,424,1302967126
534,2026-09-15,Carnage Modern,1,Prophecy of the Darkhold,Modern,No,No,328,1302970038
535,2026-09-22,Wolverine,4,Valley of Death,Epic,No,No,456,1302969692
536,2026-09-22,X-Men,17,The X-Cutioner's Song [2026 Edition],Epic,No,Yes,456,1302967886
537,2026-09-29,Spider-Gwen Modern,3,Into the Gwenverse,Modern,No,No,400,130296982X
538,2026-09-29,Venom,7,Shadows of the Past,Epic,No,No,448,1302969528
539,2026-10-06,Blade,1,His Name Is... Blade,Epic,No,No,456,1302960512
540,2026-10-06,Excalibur,4,The Douglock Chronicles,Epic,No,No,360,1302969471
541,2026-10-13,Captain America Modern,4,Reborn,Modern,No,No,320,1302970046
542,2026-10-13,Ghost Rider,4,To Slay A Demon,Epic,No,No,424,1302967452
543,2026-10-20,Moon Knight,6,The Resurrection War,Epic,No,No,384,1302969501
544,2026-10-27,Aliens,4,The Original Years Vol. 4,Epic,Yes,No,440,1302969447\`;

        let data = [];
        let filteredData = [];
        let sortColumn = 'Release_Number';
        let sortDirection = 'asc';
        
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            return lines.slice(1).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, i) => {
                    obj[header] = values[i];
                });
                return obj;
            });
        }
        
        function initializeData() {
            data = parseCSV(csvData);
            filteredData = [...data];
            updateStats();
            updateCharts();
            updateTable();
        }
        
        function updateStats() {
            const stats = {
                total: filteredData.length,
                epic: filteredData.filter(d => d.Type === 'Epic').length,
                modern: filteredData.filter(d => d.Type === 'Modern').length,
                ultimate: filteredData.filter(d => d.Type === 'Ultimate').length,
                reprints: filteredData.filter(d => d.Reprint === 'Yes').length,
                licensed: filteredData.filter(d => d.Licensed === 'Yes').length,
                avgPages: Math.round(filteredData.reduce((sum, d) => sum + parseInt(d.Pages), 0) / filteredData.length),
                totalPages: filteredData.reduce((sum, d) => sum + parseInt(d.Pages), 0)
            };
            
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total}</div>
                    <div class="stat-label">Total Releases</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.epic}</div>
                    <div class="stat-label">Epic Collections</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.modern}</div>
                    <div class="stat-label">Modern Era</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.ultimate}</div>
                    <div class="stat-label">Ultimate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.reprints}</div>
                    <div class="stat-label">Reprints</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.licensed}</div>
                    <div class="stat-label">Licensed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.avgPages}</div>
                    <div class="stat-label">Avg Pages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.totalPages.toLocaleString()}</div>
                    <div class="stat-label">Total Pages</div>
                </div>
            `;
        }
        
        let charts = {};
        
        function updateCharts() {
            // Type distribution
            const typeCounts = {};
            filteredData.forEach(d => {
                typeCounts[d.Type] = (typeCounts[d.Type] || 0) + 1;
            });
            
            if (charts.typeChart) charts.typeChart.destroy();
            charts.typeChart = new Chart(document.getElementById('typeChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(typeCounts),
                    datasets: [{
                        data: Object.values(typeCounts),
                        backgroundColor: ['#3b82f6', '#a855f7', '#eab308']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    }
                }
            });
            
            // Month distribution
            const monthCounts = {};
            filteredData.forEach(d => {
                const month = d.Release_Date.substring(0, 7);
                monthCounts[month] = (monthCounts[month] || 0) + 1;
            });
            
            if (charts.monthChart) charts.monthChart.destroy();
            charts.monthChart = new Chart(document.getElementById('monthChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(monthCounts),
                    datasets: [{
                        label: 'Releases',
                        data: Object.values(monthCounts),
                        backgroundColor: '#e62429'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        y: { 
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: { 
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
            
            // Page distribution
            const pageRanges = {
                '200-299': 0,
                '300-399': 0,
                '400-499': 0,
                '500-599': 0,
                '600+': 0
            };
            filteredData.forEach(d => {
                const pages = parseInt(d.Pages);
                if (pages < 300) pageRanges['200-299']++;
                else if (pages < 400) pageRanges['300-399']++;
                else if (pages < 500) pageRanges['400-499']++;
                else if (pages < 600) pageRanges['500-599']++;
                else pageRanges['600+']++;
            });
            
            if (charts.pagesChart) charts.pagesChart.destroy();
            charts.pagesChart = new Chart(document.getElementById('pagesChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(pageRanges),
                    datasets: [{
                        label: 'Books',
                        data: Object.values(pageRanges),
                        backgroundColor: '#a855f7'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        y: { 
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: { 
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
            
            // Top series
            const seriesCounts = {};
            filteredData.forEach(d => {
                seriesCounts[d.Series] = (seriesCounts[d.Series] || 0) + 1;
            });
            const topSeries = Object.entries(seriesCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            if (charts.seriesChart) charts.seriesChart.destroy();
            charts.seriesChart = new Chart(document.getElementById('seriesChart'), {
                type: 'bar',
                data: {
                    labels: topSeries.map(s => s[0]),
                    datasets: [{
                        label: 'Count',
                        data: topSeries.map(s => s[1]),
                        backgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        y: { 
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: { 
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }
        
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            
            // Sort data
            const sorted = [...filteredData].sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                
                if (sortColumn === 'Release_Number' || sortColumn === 'Volume' || sortColumn === 'Pages') {
                    aVal = parseInt(aVal);
                    bVal = parseInt(bVal);
                }
                
                if (sortDirection === 'asc') {
                    return aVal > bVal ? 1 : -1;
                } else {
                    return aVal < bVal ? 1 : -1;
                }
            });
            
            tbody.innerHTML = sorted.map(book => {
                const isMilestone = book.Release_Number === '500';
                const rowClass = isMilestone ? 'milestone' : '';
                
                return `
                    <tr class="${rowClass}">
                        <td><strong>${book.Release_Number}</strong></td>
                        <td>${book.Release_Date}</td>
                        <td><strong>${book.Series}</strong></td>
                        <td>${book.Volume}</td>
                        <td>${book.Subtitle}</td>
                        <td><span class="badge badge-${book.Type.toLowerCase()}">${book.Type}</span></td>
                        <td>${book.Pages}</td>
                        <td>
                            ${book.Reprint === 'Yes' ? '<span class="badge badge-reprint">Reprint</span>' : ''}
                            ${book.Licensed === 'Yes' ? '<span class="badge badge-licensed">Licensed</span>' : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function applyFilters() {
            const typeFilter = document.getElementById('typeFilter').value;
            const licensedFilter = document.getElementById('licensedFilter').value;
            const reprintFilter = document.getElementById('reprintFilter').value;
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            filteredData = data.filter(book => {
                if (typeFilter !== 'all' && book.Type !== typeFilter) return false;
                if (licensedFilter !== 'all' && book.Licensed !== licensedFilter) return false;
                if (reprintFilter !== 'all' && book.Reprint !== reprintFilter) return false;
                if (searchTerm && !book.Series.toLowerCase().includes(searchTerm) && 
                    !book.Subtitle.toLowerCase().includes(searchTerm)) return false;
                return true;
            });
            
            updateStats();
            updateCharts();
            updateTable();
        }
        
        function resetFilters() {
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('licensedFilter').value = 'all';
            document.getElementById('reprintFilter').value = 'all';
            document.getElementById('searchBox').value = '';
            applyFilters();
        }
        
        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            updateTable();
        }
        
        // Event listeners
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('licensedFilter').addEventListener('change', applyFilters);
        document.getElementById('reprintFilter').addEventListener('change', applyFilters);
        document.getElementById('searchBox').addEventListener('input', applyFilters);
        
        // Initialize
        initializeData();
    </script>
</body>
</html>
