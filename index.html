                </div>

                {/* Data Table */}
                <div className="bg-white/5 rounded-xl overflow-hidden border border-white/10">
                  <div className="p-4 bg-white/5 border-b border-white/10">
                    <h2 className="text-xl font-bold">
                      {yearFilter === 'All Years' ? '2026 Releases' : '2026 Releases'} 
                      <span className="text-gray-400 ml-2 text-sm">({sortedData.length} books)</span>
                    </h2>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full">
                      <thead className="bg-white/10">
                        <tr>
                          {['Release_Number', 'Series', 'Volume', 'Subtitle', 'Type', 'Pages', 'Release_Date'].map(key => (
                            <th 
                              key={key}
                              onClick={() => handleSort(key)}
                              className="px-4 py-3 text-left cursor-pointer hover:bg-white/5 transition-colors"
                            >
                              <div className="flex items-center gap-1">
                                {key.replace(/_/g, ' ')}
                                {sortConfig.key === key && (
                                  <span>{sortConfig.direction === 'asc' ? '↑' : '↓'}</span>
                                )}
                              </div>
                            </th>
                          ))}
                          <th className="px-4 py-3 text-left">Tags</th>
                        </tr>
                      </thead>
                      <tbody>{sortedData.map((book) => (
                        <tr 
                          key={book.Release_Number} 
                          className={`border-t border-white/5 hover:bg-white/5 transition-colors ${
                            book.Release_Number === 500 ? 'bg-gradient-to-r from-yellow-600/20 to-transparent animate-pulse' : ''
                          }`}
                        >
                          <td className="px-4 py-3 font-mono text-sm">
                            {book.Release_Number === 500 ? (
                              <span className="font-bold text-yellow-400">#{book.Release_Number} 🎉</span>
                            ) : (
                              `#${book.Release_Number}`
                            )}
                          </td>
                          <td className="px-4 py-3 font-medium">{book.Series}</td>
                          <td className="px-4 py-3">{book.Volume}</td>
                          <td className="px-4 py-3 text-gray-300">{book.Subtitle}</td>
                          <td className="px-4 py-3">
                            <span className={`px-2 py-1 rounded text-xs font-medium ${
                              book.Type === 'Epic' ? 'bg-blue-500/20 text-blue-400' :
                              book.Type === 'Modern' ? 'bg-purple-500/20 text-purple-400' :
                              'bg-green-500/20 text-green-400'
                            }`}>
                              {book.Type}
                            </span>
                          </td>
                          <td className="px-4 py-3 text-gray-300">{book.Pages}</td>
                          <td className="px-4 py-3 text-gray-400 text-sm">{book.Release_Date}</td>
                          <td className="px-4 py-3">
                            <div className="flex gap-1">
                              {book.Reprint === 'Yes' && <span className="px-2 py-1 rounded text-xs font-medium bg-red-500/20 text-red-400">Reprint</span>}
                              {book.Licensed === 'Yes' && <span className="px-2 py-1 rounded text-xs font-medium bg-green-500/20 text-green-400">Licensed</span>}
                            </div>
                          </td>
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                </div>

                {/* Footer */}
                <div className="mt-8 text-center text-sm text-gray-500">
                  <p>Data sources: Marvel.com, Wikipedia • Last updated: March 2026</p>
                  <p className="mt-2">Historical data extraction (Books #1-487) in progress</p>
                </div>
              </div>
            </div>
          );
        };

        ReactDOM.render(<MarvelEpicDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
