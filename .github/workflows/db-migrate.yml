name: Run Database Migration

on:
  # Trigger manually from the Actions tab in GitHub
  workflow_dispatch:

  # Also auto-run when supabase-migration.sql changes on main
  push:
    branches: [main]
    paths:
      - 'supabase-migration.sql'

jobs:
  migrate:
    name: Apply SQL migration to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Verify SUPABASE_DB_PASSWORD secret is set
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: SUPABASE_DB_PASSWORD"
            echo "Value: your Supabase database password (found in Project Settings → Database → Connection string)"
            exit 1
          fi
          echo "✓ SUPABASE_DB_PASSWORD secret is present"

      - name: Test database connectivity
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Testing connection to Supabase…"
          psql \
            "postgresql://postgres@db.quxuidnmewcmovjbnfgy.supabase.co:5432/postgres?sslmode=require" \
            -c "SELECT version();" \
            --connect-timeout=15 \
            -v ON_ERROR_STOP=1
          echo "✓ Connection successful"

      - name: Run migration
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql \
            "postgresql://postgres@db.quxuidnmewcmovjbnfgy.supabase.co:5432/postgres?sslmode=require" \
            --file=supabase-migration.sql \
            --connect-timeout=15 \
            -v ON_ERROR_STOP=1

      - name: Confirm columns exist
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql \
            "postgresql://postgres@db.quxuidnmewcmovjbnfgy.supabase.co:5432/postgres?sslmode=require" \
            --connect-timeout=15 \
            -c "SELECT column_name, data_type FROM information_schema.columns
                WHERE table_name='comic_entries'
                  AND column_name IN (
                    'isbn','writers','artists','description',
                    'issues_covered','secondary_issues_covered'
                  )
                ORDER BY column_name;"
