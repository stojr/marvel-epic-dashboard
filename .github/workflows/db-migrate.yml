name: Run Database Migration

on:
  # Trigger manually from the Actions tab in GitHub
  workflow_dispatch:

  # Also auto-run when any migration file changes on main
  push:
    branches: [main]
    paths:
      - 'supabase-migration.sql'
      - 'supabase-migration-v5.sql'
      - 'supabase-migration-v6.sql'
      - 'supabase-migration-v7.sql'

jobs:
  migrate:
    name: Apply SQL migration to Supabase
    runs-on: ubuntu-latest

    # Uses the Session Pooler (aws-0-us-east-1.pooler.supabase.com) because the
    # direct host (db.*.supabase.co) is IPv6-only and GitHub Actions runners are
    # IPv4-only. Session Pooler supports both IPv4 and IPv6.
    env:
      DB_URL: "postgresql://postgres.quxuidnmewcmovjbnfgy@aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require"
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PGCONNECT_TIMEOUT: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Verify SUPABASE_DB_PASSWORD secret is set
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "Name:  SUPABASE_DB_PASSWORD"
            echo "Value: your Supabase database password (Project Settings → Database → Database password)"
            exit 1
          fi
          echo "✓ SUPABASE_DB_PASSWORD is set"

      - name: Test database connectivity
        run: |
          echo "Testing connection via Session Pooler…"
          psql "$DB_URL" -c "SELECT version();" -v ON_ERROR_STOP=1
          echo "✓ Connection successful"

      - name: Run migrations
        run: |
          psql "$DB_URL" --file=supabase-migration.sql -v ON_ERROR_STOP=1
          psql "$DB_URL" --file=supabase-migration-v5.sql -v ON_ERROR_STOP=1
          psql "$DB_URL" --file=supabase-migration-v6.sql -v ON_ERROR_STOP=1
          psql "$DB_URL" --file=supabase-migration-v7.sql -v ON_ERROR_STOP=1

      - name: Confirm columns exist
        run: |
          psql "$DB_URL" -c "SELECT column_name, data_type
              FROM information_schema.columns
              WHERE table_name='comic_entries'
                AND column_name IN (
                  'isbn','writers','artists','description',
                  'issues_covered','secondary_issues_covered'
                )
              ORDER BY column_name;"
