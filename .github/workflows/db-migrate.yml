name: Run Database Migration

on:
  # Trigger manually from the Actions tab in GitHub
  workflow_dispatch:

  # Also auto-run when supabase-migration.sql changes on main
  push:
    branches: [main]
    paths:
      - 'supabase-migration.sql'

jobs:
  migrate:
    name: Apply SQL migration to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      # ---------------------------------------------------------------------------
      # Connection notes:
      #   Newer Supabase projects use IPv6-only for direct connections, but
      #   GitHub Actions runners are IPv4-only — causing psql exit code 2.
      #
      #   RECOMMENDED FIX: set SUPABASE_DB_URL to the Session Pooler connection
      #   string from your Supabase dashboard (IPv4 + IPv6 compatible):
      #     Project Settings → Database → Connection string → Session mode
      #     e.g. postgresql://postgres.PROJECT_REF:PASSWORD@aws-0-REGION.pooler.supabase.com:5432/postgres
      #
      #   If SUPABASE_DB_URL is not set, the workflow falls back to the direct
      #   connection using SUPABASE_DB_PASSWORD (works only on IPv6-capable runners).
      # ---------------------------------------------------------------------------

      - name: Verify database credentials are set
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ] && [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::No database credentials found. Set either:"
            echo "  SUPABASE_DB_URL  — full Session Pooler connection string from Supabase dashboard (recommended)"
            echo "  SUPABASE_DB_PASSWORD — Supabase database password (direct connection, may fail on IPv4 runners)"
            echo ""
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          if [ -n "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "✓ SUPABASE_DB_URL is set (Session Pooler — IPv4 compatible)"
          else
            echo "⚠ SUPABASE_DB_URL not set — using direct connection with SUPABASE_DB_PASSWORD"
            echo "  If the workflow fails with exit code 2, set SUPABASE_DB_URL to the Session Pooler URL."
          fi

      - name: Test database connectivity
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGCONNECT_TIMEOUT: 15
        run: |
          CONN="${DB_URL:-postgresql://postgres@db.quxuidnmewcmovjbnfgy.supabase.co:5432/postgres?sslmode=require}"
          echo "Testing connection…"
          psql "$CONN" \
            -c "SELECT version();" \
            -v ON_ERROR_STOP=1
          echo "✓ Connection successful"

      - name: Run migration
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGCONNECT_TIMEOUT: 15
        run: |
          CONN="${DB_URL:-postgresql://postgres@db.quxuidnmewcmovjbnfgy.supabase.co:5432/postgres?sslmode=require}"
          psql "$CONN" \
            --file=supabase-migration.sql \
            -v ON_ERROR_STOP=1

      - name: Confirm columns exist
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGCONNECT_TIMEOUT: 15
        run: |
          CONN="${DB_URL:-postgresql://postgres@db.quxuidnmewcmovjbnfgy.supabase.co:5432/postgres?sslmode=require}"
          psql "$CONN" \
            -c "SELECT column_name, data_type FROM information_schema.columns
                WHERE table_name='comic_entries'
                  AND column_name IN (
                    'isbn','writers','artists','description',
                    'issues_covered','secondary_issues_covered'
                  )
                ORDER BY column_name;"
